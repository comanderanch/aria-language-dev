<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI-Core Console</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: ui-sans-serif, system-ui, Arial; max-width: 920px; margin: 24px auto; padding: 0 12px; }
    h1 { margin: 0 0 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    button { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
    pre { background: #111; color: #eee; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 800px){ .cols { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>AI-Core Console</h1>

  <div class="row">
    <button id="initBtn">Init (profile+ingest)</button>
    <button data-cmd=":stats">:stats</button>
    <button data-cmd=":memfacts">:memfacts</button>
    <button data-cmd=":ingestfacts">:ingestfacts</button>
    <button data-cmd=":profiles">:profiles</button>
    <button data-cmd=":profile psychology">:profile psychology</button>
    <button data-cmd=":recenter">:recenter</button>
  </div>

  <div class="cols">
    <div>
      <h3>Ask</h3>
      <input id="ask" placeholder="Type a question…" />
      <div class="row">
        <button id="askBtn">Send</button>
        <button id="imagineBtn">Imagination (unverified)</button>
      </div>
    </div>
    <div>
      <h3>Command</h3>
      <input id="cmd" placeholder="Type a REPL command (e.g., :teach, :promote 1)"/>
      <button id="cmdBtn">Run</button>
    </div>
  </div>

  <h3>Output</h3>
  <pre id="out">(output will appear here)</pre>

<script>
async function postLines(lines){
  const res = await fetch("/api/run", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({lines})
  });
  const j = await res.json();
  const text = (j.stdout||"") + (j.stderr ? "\n[stderr]\\n"+j.stderr : "");
  document.getElementById("out").textContent = text || "(no output)";
}

async function imagine(text){
  const res = await fetch("/api/imagine", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text})
  });
  const j = await res.json();
  const textOut = (j.draft || "(no draft)");
  document.getElementById("out").textContent = textOut;
}

document.getElementById("initBtn").addEventListener("click", ()=>{
  postLines([":profile psychology", ":ingestfacts", ":memfacts"]);
});
document.querySelectorAll("button[data-cmd]").forEach(btn=>{
  btn.addEventListener("click", ()=> postLines([btn.dataset.cmd]));
});
document.getElementById("askBtn").addEventListener("click", ()=>{
  const v = document.getElementById("ask").value.trim();
  if(v) postLines([v]);
});
document.getElementById("imagineBtn").addEventListener("click", ()=>{
  const v = document.getElementById("ask").value.trim();
  if(v) imagine(v);
});
document.getElementById("cmdBtn").addEventListener("click", ()=>{
  const v = document.getElementById("cmd").value.trim();
  if(v) postLines([v]);
});
</script>
</body>
</html>
